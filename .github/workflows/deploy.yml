name: Deploy

on:
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to redeploy (leave empty for full apply)"
        required: false
        default: ""

env:
  KUBECONFIG_PATH: /etc/rancher/k3s/k3s.yaml
  NAMESPACE: aggro

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          SERVICE: ${{ github.event.client_payload.service || github.event.inputs.service }}
          TAG: ${{ github.event.client_payload.tag || 'latest' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SERVICE,TAG
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            if [ -n "$SERVICE" ] && [ "$SERVICE" != "all" ]; then
              echo "Rolling out $SERVICE with tag $TAG"
              kubectl -n aggro set image "deployment/$SERVICE" \
                "*=ghcr.io/agggroanalytics/${SERVICE}:${TAG}"
              kubectl -n aggro rollout status "deployment/$SERVICE" --timeout=120s
            else
              echo "Full cluster apply requested — pull latest infra repo and apply"
              cd /opt/aggro || exit 1
              git pull origin master
              kubectl apply -k k8s/
            fi
