name: Deploy

on:
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to redeploy (leave empty for full apply)"
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          SERVICE: ${{ github.event.client_payload.service || github.event.inputs.service }}
          TAG: ${{ github.event.client_payload.tag || 'latest' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SERVICE,TAG
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            NS=aggro

            rollout() {
              local deploy="$1" image="$2"
              echo "Updating $deploy -> $image:$TAG"
              kubectl -n $NS set image "deployment/$deploy" "*=${image}:${TAG}"
              kubectl -n $NS rollout status "deployment/$deploy" --timeout=180s
            }

            if [ -z "$SERVICE" ] || [ "$SERVICE" = "all" ]; then
              echo "Full apply: pulling latest manifests"
              cd /opt/aggro && git pull origin master
              set -a && source .env && set +a
              bash scripts/bootstrap-vps.sh
              exit 0
            fi

            case "$SERVICE" in
              backend)
                rollout backend ghcr.io/agggroanalytics/backend
                ;;
              frontend)
                rollout frontend ghcr.io/agggroanalytics/frontend
                ;;
              ingestion-worker)
                rollout ingestion-worker ghcr.io/agggroanalytics/ingestion
                ;;
              m1-health-stress)
                rollout m1-health-stress-training ghcr.io/agggroanalytics/m1-health-stress-training
                rollout m1-health-stress-inference ghcr.io/agggroanalytics/m1-health-stress-inference
                ;;
              m2-irrigation-wateruse)
                rollout m2-irrigation-wateruse-training ghcr.io/agggroanalytics/m2-irrigation-wateruse-training
                rollout m2-irrigation-wateruse-inference ghcr.io/agggroanalytics/m2-irrigation-wateruse-inference
                ;;
              m3-soil-degradation)
                rollout m3-soil-degradation-training ghcr.io/agggroanalytics/m3-soil-degradation-training
                rollout m3-soil-degradation-inference ghcr.io/agggroanalytics/m3-soil-degradation-inference
                ;;
              *)
                echo "Unknown service: $SERVICE"
                exit 1
                ;;
            esac
