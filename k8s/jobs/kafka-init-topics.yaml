apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init-topics
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-topics
          image: apache/kafka:3.7.0
          command:
            - bash
            - -c
            - |
              echo "Waiting for Kafka..."
              for i in $(seq 1 60); do
                /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1 && break
                sleep 2
              done
              for topic in analysis.requested analysis.status report.requested report.status; do
                /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
                  --create --topic $topic --partitions 1 --replication-factor 1 --if-not-exists
                echo "Topic $topic ensured"
              done
              echo "All topics ready"
