apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aggro-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: aggro-headers@kubernetescrd
spec:
  tls:
    - hosts:
        - __DOMAIN__
      secretName: aggro-tls
  rules:
    - host: __DOMAIN__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
