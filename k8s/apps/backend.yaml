apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  BACKEND_POSTGRES_DSN: "postgres://postgres:__PG_PASSWORD__@postgres:5432/aggro_backend?sslmode=disable"
  BACKEND_KEYCLOAK_URL: "http://keycloak:8080/auth"
  BACKEND_KEYCLOAK_REALM: "aggro"
  BACKEND_KAFKA_BROKERS: "kafka:9092"
  BACKEND_MINIO_ENDPOINT: "minio:9000"
  BACKEND_MINIO_BUCKET: "aggro-artifacts"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          image: ghcr.io/agggroanalytics/backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
